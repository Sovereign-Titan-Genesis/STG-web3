<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STG Galactica OS</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <style>
    body, html { margin:0; padding:0; overflow:hidden; font-family:"Courier New", monospace; color:#00ffcc; }
    #overlay { position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,0,0,0.6); padding:20px; border-radius:8px; box-shadow:0 0 15px #00ffcc; width:400px; }
    h1 { color:#ffcc00; text-shadow:0 0 10px #ffcc00; }
    .terminal { background:#111; color:#0f0; padding:10px; border-radius:5px; box-shadow:inset 0 0 10px #0f0; margin-top:10px; }
    input { width:100%; background:#000; color:#0f0; border:none; padding:8px; font-family:"Courier New"; }
    .tx { margin:8px 0; padding:8px; border-left:3px solid #ffcc00; background:rgba(0,0,0,0.6); }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>🌌 STG Galactica OS</h1>
    <div class="terminal" id="output">Command OS ready...</div>
    <input id="command" placeholder="Type command here...">
  </div>

  <script>
    // === Three.js Background ===
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1000;
    const starVertices = [];
    for (let i = 0; i < starCount; i++) {
      starVertices.push((Math.random() - 0.5) * 2000);
      starVertices.push((Math.random() - 0.5) * 2000);
      starVertices.push((Math.random() - 0.5) * 2000);
    }
    starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0x00ffcc });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    const gridHelper = new THREE.GridHelper(1000, 50, 0xffcc00, 0x333333);
    scene.add(gridHelper);
    camera.position.z = 5;

    function animate() {
      requestAnimationFrame(animate);
      stars.rotation.x += 0.0005;
      stars.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    // === Blockchain Command OS ===
    async function main() {
      const provider = new ethers.JsonRpcProvider("http://127.0.0.1:8545");
      const contractAddress = "ALAMAT_KONTRAK_LOCAL"; // ganti dengan alamat kontrak deploy
      const abi = [
        "function balanceOf(address) view returns (uint)",
        "function transfer(address,uint) returns (bool)",
        "event Transfer(address indexed from, address indexed to, uint amount)"
      ];
      const token = new ethers.Contract(contractAddress, abi, provider);
      const accounts = await provider.listAccounts();
      const owner = accounts[0];
      const signer = provider.getSigner(owner);

      const output = document.getElementById("output");
      const input = document.getElementById("command");

      input.addEventListener("keydown", async (e) => {
        if (e.key === "Enter") {
          const cmd = input.value.trim();
          input.value = "";
          if (cmd === "stg balance") {
            const bal = await token.balanceOf(owner);
            output.innerHTML += `<div>STG Balance (Owner): ${bal}</div>`;
          } else if (cmd.startsWith("stg send")) {
            const parts = cmd.split(" ");
            const to = parts[2];
            const amount = parts[3];
            const tx = await token.connect(signer).transfer(to, amount);
            output.innerHTML += `<div class="tx">TX Hash: ${tx.hash}<br>Sent ${amount} STG to ${to}</div>`;
          } else {
            output.innerHTML += `<div>Unknown command: ${cmd}</div>`;
          }
        }
      });

      // Listen event Transfer
      token.on("Transfer", async (from, to, amount, event) => {
        output.innerHTML += `<div class="tx">Event Transfer → TX: ${event.log.transactionHash}<br>From: ${from}<br>To: ${to}<br>Amount: ${amount.toString()}</div>`;
      });
    }
    main();
  </script>
</body>
</html>
