<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STG Galactica OS</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Courier New", monospace;
      color: #00ffcc;
    }
    #overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 15px #00ffcc;
    }
    h1 { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }
    .panel { margin: 10px 0; }
    .tx { margin: 8px 0; padding: 8px; border-left: 3px solid #ffcc00; background: rgba(0,0,0,0.6); }
    .terminal { background: #111; color: #0f0; padding: 10px; border-radius: 5px; box-shadow: inset 0 0 10px #0f0; }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>🌌 STG Galactica OS</h1>
    <div class="panel">
      <h2>Saldo Akun</h2>
      <div id="balances" class="terminal">Loading balances...</div>
    </div>
    <div class="panel">
      <h2>Explorer Mini</h2>
      <div id="explorer">Menunggu transaksi...</div>
    </div>
  </div>

  <script>
    // === Three.js Background ===
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Bintang
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1000;
    const starVertices = [];
    for (let i = 0; i < starCount; i++) {
      starVertices.push((Math.random() - 0.5) * 2000);
      starVertices.push((Math.random() - 0.5) * 2000);
      starVertices.push((Math.random() - 0.5) * 2000);
    }
    starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0x00ffcc });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Grid Futuristik
    const gridHelper = new THREE.GridHelper(1000, 50, 0xffcc00, 0x333333);
    scene.add(gridHelper);

    camera.position.z = 5;

    function animate() {
      requestAnimationFrame(animate);
      stars.rotation.x += 0.0005;
      stars.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    // === Blockchain Explorer ===
    async function main() {
      const provider = new ethers.JsonRpcProvider("http://127.0.0.1:8545");
      const contractAddress = "ALAMAT_KONTRAK_LOCAL"; // ganti dengan alamat kontrak deploy
      const abi = [
        "function balanceOf(address) view returns (uint)",
        "event Transfer(address indexed from, address indexed to, uint amount)"
      ];
      const token = new ethers.Contract(contractAddress, abi, provider);

      const accounts = await provider.listAccounts();
      const owner = accounts[0];
      const user1 = accounts[1];
      const user2 = accounts[2];

      async function updateBalances() {
        const balOwner = await token.balanceOf(owner);
        const balUser1 = await token.balanceOf(user1);
        const balUser2 = await token.balanceOf(user2);
        document.getElementById("balances").innerHTML =
          `Owner: ${balOwner}<br>User1: ${balUser1}<br>User2: ${balUser2}`;
      }
      await updateBalances();

      token.on("Transfer", async (from, to, amount, event) => {
        const txHtml = `
          <div class="tx">
            <strong>TX Hash:</strong> ${event.log.transactionHash}<br>
            <strong>From:</strong> ${from}<br>
            <strong>To:</strong> ${to}<br>
            <strong>Amount:</strong> ${amount.toString()}
          </div>
        `;
        document.getElementById("explorer").innerHTML += txHtml;
        await updateBalances();
      });
    }
    main();
  </script>
</body>
</html>
