name: STG Public Services Dashboard (JASAWAN)

on:
  workflow_dispatch:
    inputs:
      services_action:
        description: 'Pilih Mode Layanan Publik'
        required: true
        type: choice
        options:
          - 'DISTRIBUTE_FOOD_PACKAGES'
          - 'DEPLOY_SOLAR_PANELS'
          - 'SUPPLY_MEDICINES'
          - 'DELIVER_EDUCATION_KITS'

jobs:
  services-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Services Guard
        run: |
          echo "🏛️ Public Services Dashboard (JASAWAN): ACTIVE"
          echo "Mode: ${{ github.event.inputs.services_action }} sedang diproses..."

      - name: Distribute Food Packages
        if: github.event.inputs.services_action == 'DISTRIBUTE_FOOD_PACKAGES'
        run: |
          echo "🍚 Mendistribusikan paket pangan (beras, protein)..."
          echo "| $(date) | SERVICES | Food Packages | Distributed |" >> SERVICES_LOG.md

      - name: Deploy Solar Panels
        if: github.event.inputs.services_action == 'DEPLOY_SOLAR_PANELS'
        run: |
          echo "🔆 Memasang panel bio-solar di desa pesisir..."
          echo "| $(date) | SERVICES | Solar Panels | Deployed |" >> SERVICES_LOG.md

      - name: Supply Medicines
        if: github.event.inputs.services_action == 'SUPPLY_MEDICINES'
        run: |
          echo "💊 Menyalurkan obat-obatan ke klinik..."
          echo "| $(date) | SERVICES | Medicines | Supplied |" >> SERVICES_LOG.md

      - name: Deliver Education Kits
        if: github.event.inputs.services_action == 'DELIVER_EDUCATION_KITS'
        run: |
          echo "📦 Mengirimkan paket pendidikan ke sekolah..."
          echo "| $(date) | SERVICES | Education Kits | Delivered |" >> SERVICES_LOG.md

      - name: Secure Audit Trail
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add SERVICES_LOG.md
          git commit -m "Public Services Update: ${{ github.event.inputs.services_action }}"
          git push
          
