name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run lint if available
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script defined, skipping lint."
          fi

      - name: Start Hardhat node (background)
        run: |
          npx hardhat node > hh_node.log 2>&1 &
          echo "Waiting for Hardhat node to be ready..."
          sleep 5

      - name: Run tests
        env:
          HARDHAT_NETWORK: localhost
        run: npx hardhat test --network localhost

      - name: Run deploy script to localhost (simulation)
        run: |
          npx hardhat run scripts/deploySTGToken.js --network localhost

      - name: Upload Hardhat node log (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-node-log
          path: hh_node.log
          
