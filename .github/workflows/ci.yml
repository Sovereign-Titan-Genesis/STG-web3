# (salin isi workflow CI and Deploy yang sudah disiapkan sebelumnya)
name: CI and Deploy
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx hardhat test
  deploy-testnet:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'
    env:
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      TARGET_NETWORK: sepolia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - name: Start Hardhat node (background)
        run: |
          npx hardhat node > hh_node.log 2>&1 &
          sleep 5
      - run: npx hardhat test --network localhost
      - run: npx hardhat run scripts/deploySTGToken.js --network ${{ env.TARGET_NETWORK }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-node-log
          path: hh_node.log
  deploy-prod:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      TARGET_NETWORK: mainnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - name: Start Hardhat node (background)
        run: |
          npx hardhat node > hh_node.log 2>&1 &
          sleep 5
      - run: npx hardhat test --network localhost
      - run: npx hardhat run scripts/deploySTGToken.js --network ${{ env.TARGET_NETWORK }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-node-log
          path: hh_node.log
