name: CI and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
        working-directory: ./stg-web3
      - name: Run tests
        run: npm test
        working-directory: ./stg-web3

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'
    env:
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      TARGET_NETWORK: sepolia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
        working-directory: ./stg-web3
      - name: Start Hardhat node
        run: |
          npx hardhat node > hh_node.log 2>&1 &
        working-directory: ./stg-web3
      - name: Wait for node
        run: sleep 5
      - name: Run tests against localhost
        run: npm test -- --network localhost
        working-directory: ./stg-web3
      - name: Deploy to testnet
        run: npx hardhat run scripts/deploySTGToken.js --network ${{ env.TARGET_NETWORK }}
        working-directory: ./stg-web3
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-node-log
          path: stg-web3/hh_node.log

  deploy-prod:
    name: Deploy to Mainnet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      TARGET_NETWORK: mainnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
        working-directory: ./stg-web3
      - name: Start Hardhat node
        run: |
          npx hardhat node > hh_node.log 2>&1 &
        working-directory: ./stg-web3
      - name: Wait for node
        run: sleep 5
      - name: Run tests against localhost
        run: npm test -- --network localhost
        working-directory: ./stg-web3
      - name: Deploy to mainnet
        run: npx hardhat run scripts/deploySTGToken.js --network ${{ env.TARGET_NETWORK }}
        working-directory: ./stg-web3
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-node-log
          path: stg-web3/hh_node.log
          
